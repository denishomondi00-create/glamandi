name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build production images
        run: docker compose -f infra/docker/docker-compose.prod.yml build
      - name: Deployment note
        run: echo "Push images or run remote deployment script according to hosting provider."
